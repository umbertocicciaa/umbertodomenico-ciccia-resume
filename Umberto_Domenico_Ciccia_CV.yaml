design:
  theme: classic

  page:
    size: us-letter
    top_margin: 0.6in
    bottom_margin: 0.6in
    left_margin: 0.65in
    right_margin: 0.65in
    show_footer: false

  typography:
    font_size:
      body: 9.8pt
      name: 26pt
      connections: 9.8pt
      section_titles: 1.2em
    line_spacing: 0.58em

  header:
    space_below_name: 0.4cm
    space_below_connections: 0.5cm

  section_titles:
    space_above: 0.3cm
    space_below: 0.18cm

  sections:
    space_between_regular_entries: 0.85em
    space_between_text_based_entries: 0.18em
    show_time_spans_in: []

  entries:
    date_and_location_width: 0cm
    highlights:
      space_above: 0cm
      space_between_items: 0cm
    summary:
      space_above: 0cm

  templates:
    experience_entry:
      main_column: |-
        **COMPANY**, POSITION
        LOCATION DATE
        SUMMARY
        HIGHLIGHTS
      date_and_location_column: ""
    normal_entry:
      main_column: |-
        **NAME**
        LOCATION DATE
        SUMMARY
        HIGHLIGHTS
      date_and_location_column: ""
    education_entry:
      main_column: |-
        **INSTITUTION**, AREA
        LOCATION DATE
        SUMMARY
        HIGHLIGHTS
      degree_column: "**DEGREE**"
      date_and_location_column: ""